<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>速度 · Car Race</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;700&family=Zen+Dots&display=swap" rel="stylesheet">
<style>
  :root {
    --crimson: #C0392B;
    --gold: #F4C842;
    --ink: #0A0A0F;
    --mist: #1A1A2E;
    --paper: #F5ECD7;
    --sakura: #FFB7C5;
    --steel: #B0BEC5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    font-family: 'Noto Serif JP', serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* BACKGROUND */
  .bg-gradient {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 20% 50%, #1a0005 0%, transparent 60%),
                radial-gradient(ellipse at 80% 30%, #0d0020 0%, transparent 60%),
                linear-gradient(180deg, #050010 0%, #0A0005 50%, #050010 100%);
  }

  /* JAPANESE TITLE */
  .title-block {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
  }
  .title-jp {
    font-family: 'Noto Serif JP', serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 8px;
    color: var(--gold);
    opacity: 0.9;
    text-transform: uppercase;
  }
  .title-main {
    font-family: 'Zen Dots', cursive;
    font-size: clamp(28px, 5vw, 52px);
    color: var(--paper);
    letter-spacing: 4px;
    line-height: 1;
    margin-top: 4px;
    text-shadow: 0 0 40px rgba(192,57,43,0.8), 0 0 80px rgba(192,57,43,0.4);
  }
  .title-sub {
    font-family: 'Noto Serif JP', serif;
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--steel);
    margin-top: 6px;
    opacity: 0.6;
  }

  /* VERTICAL KANJI STRIPS */
  .kanji-strip {
    position: absolute;
    top: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    font-weight: 300;
    color: rgba(244,200,66,0.15);
    letter-spacing: 2px;
    z-index: 2;
    pointer-events: none;
  }
  .kanji-strip.left { left: 28px; }
  .kanji-strip.right { right: 28px; }

  /* SCENE */
  .scene {
    position: relative;
    width: 100vw;
    height: 340px;
    overflow: hidden;
  }

  /* MOUNTAIN BG */
  .mountain {
    position: absolute;
    bottom: 120px;
    left: 0; right: 0;
  }
  .mountain svg { width: 100%; }

  /* SAKURA PETALS */
  .petals-container {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
  }
  .petal {
    position: absolute;
    top: -20px;
    width: 10px; height: 8px;
    background: var(--sakura);
    border-radius: 50% 50% 0 50%;
    opacity: 0.7;
    animation: petalFall linear infinite;
  }
  @keyframes petalFall {
    0%   { transform: translateX(0) translateY(-20px) rotate(0deg); opacity: 0.8; }
    100% { transform: translateX(80px) translateY(400px) rotate(720deg); opacity: 0; }
  }

  /* ROAD */
  .road {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    height: 130px;
    background: linear-gradient(180deg, #1a1a1a 0%, #111 100%);
    border-top: 3px solid #2a2a2a;
  }
  .road-line {
    position: absolute;
    top: 50%;
    height: 4px;
    width: 80px;
    background: var(--gold);
    opacity: 0.5;
    animation: roadLine 0.6s linear infinite;
  }
  @keyframes roadLine {
    0%   { transform: translateX(110vw); }
    100% { transform: translateX(-100px); }
  }
  .road-line:nth-child(1) { animation-delay: 0s; }
  .road-line:nth-child(2) { animation-delay: -0.2s; }
  .road-line:nth-child(3) { animation-delay: -0.4s; }
  .road-line:nth-child(4) { animation-delay: -0.1s; }
  .road-line:nth-child(5) { animation-delay: -0.3s; }

  /* SPEED LINES */
  .speed-lines {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .speed-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(192,57,43,0.4), transparent);
    animation: speedLine linear infinite;
  }
  @keyframes speedLine {
    0%   { transform: translateX(120vw); opacity: 1; }
    100% { transform: translateX(-200px); opacity: 0; }
  }

  /* CAR SVG */
  .car-wrapper {
    position: absolute;
    bottom: 90px;
    left: 15%;
    z-index: 6;
    animation: carDrive 0.08s ease-in-out infinite alternate, carEntry 1.5s ease-out forwards;
    filter: drop-shadow(0 10px 30px rgba(192,57,43,0.6)) drop-shadow(0 0 60px rgba(192,57,43,0.3));
  }
  @keyframes carDrive {
    0%   { transform: translateY(0px); }
    100% { transform: translateY(-3px); }
  }
  @keyframes carEntry {
    0%   { left: -30%; opacity: 0; }
    100% { left: 15%; opacity: 1; }
  }

  .car-svg { width: 280px; height: auto; }

  /* EXHAUST */
  .exhaust {
    position: absolute;
    bottom: 102px;
    left: calc(15% - 30px);
    z-index: 5;
    display: flex;
    gap: 4px;
    animation: carEntry 1.5s ease-out forwards;
  }
  .smoke {
    width: 20px; height: 14px;
    background: radial-gradient(circle, rgba(200,200,200,0.5), transparent);
    border-radius: 50%;
    animation: smokeAnim 0.4s ease-out infinite;
  }
  .smoke:nth-child(2) { animation-delay: 0.1s; width: 30px; }
  .smoke:nth-child(3) { animation-delay: 0.2s; width: 18px; }
  @keyframes smokeAnim {
    0%   { transform: translateX(0) scale(1); opacity: 0.6; }
    100% { transform: translateX(-40px) scale(2); opacity: 0; }
  }

  /* HEADLIGHT BEAM */
  .headlight-beam {
    position: absolute;
    bottom: 108px;
    left: calc(15% + 268px);
    width: 200px; height: 40px;
    background: linear-gradient(90deg, rgba(244,200,66,0.6), transparent);
    clip-path: polygon(0 40%, 100% 0%, 100% 100%, 0 60%);
    z-index: 5;
    animation: beamPulse 0.3s ease-in-out infinite alternate, carEntry 1.5s ease-out forwards;
    pointer-events: none;
  }
  @keyframes beamPulse {
    0%   { opacity: 0.7; }
    100% { opacity: 1; }
  }

  /* SPEED METER */
  .hud {
    position: absolute;
    bottom: 24px;
    right: 40px;
    z-index: 10;
    text-align: right;
  }
  .speed-num {
    font-family: 'Zen Dots', cursive;
    font-size: 48px;
    color: var(--gold);
    line-height: 1;
    text-shadow: 0 0 20px rgba(244,200,66,0.8);
    animation: speedCount 0.05s steps(1) infinite;
  }
  @keyframes speedCount {
    0%   { content: ""; }
  }
  .speed-unit {
    font-family: 'Noto Serif JP', serif;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--steel);
    opacity: 0.7;
  }

  /* LAP COUNTER */
  .lap {
    position: absolute;
    top: 100px;
    right: 40px;
    z-index: 10;
    text-align: right;
  }
  .lap-label {
    font-family: 'Noto Serif JP', serif;
    font-size: 10px;
    letter-spacing: 5px;
    color: var(--crimson);
    text-transform: uppercase;
  }
  .lap-num {
    font-family: 'Zen Dots', cursive;
    font-size: 32px;
    color: var(--paper);
    text-shadow: 0 0 20px rgba(192,57,43,0.6);
  }

  /* RED SEAL */
  .seal {
    position: absolute;
    top: 90px;
    left: 40px;
    width: 64px; height: 64px;
    border: 2px solid var(--crimson);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    animation: sealRotate 8s linear infinite;
  }
  .seal-inner {
    font-family: 'Noto Serif JP', serif;
    font-size: 11px;
    color: var(--crimson);
    text-align: center;
    line-height: 1.2;
    font-weight: 700;
  }
  @keyframes sealRotate {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* DIVIDER LINE */
  .divider {
    position: absolute;
    left: 40px; right: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--crimson), var(--gold), var(--crimson), transparent);
    z-index: 10;
    opacity: 0.4;
  }
  .divider.top { top: 80px; }
  .divider.bottom { bottom: 80px; }

  /* GLOW ORBS */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 300px; height: 300px; background: rgba(192,57,43,0.12); top: 30%; left: 10%; }
  .orb2 { width: 200px; height: 200px; background: rgba(244,200,66,0.08); top: 20%; right: 15%; }

  /* PARTICLE SPARKS */
  .spark {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--gold);
    animation: sparkFly linear infinite;
    z-index: 7;
  }
  @keyframes sparkFly {
    0%   { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(-80px, -40px) scale(0); opacity: 0; }
  }
</style>
</head>
<body>

<div class="bg-gradient"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- TITLE -->
<div class="title-block">
  <div class="title-jp">グランプリ · GRAND PRIX</div>
  <div class="title-main">RACING</div>
  <div class="title-sub">速度と炎 · SPEED & FIRE</div>
</div>

<!-- KANJI STRIPS -->
<div class="kanji-strip left">速<br>力<br>炎<br>走<br>夢<br>速<br>力</div>
<div class="kanji-strip right">峠<br>道<br>風<br>火<br>魂<br>峠<br>道</div>

<!-- DIVIDERS -->
<div class="divider top"></div>
<div class="divider bottom"></div>

<!-- SEAL -->
<div class="seal"><div class="seal-inner">GP<br>一位</div></div>

<!-- LAP COUNTER -->
<div class="lap">
  <div class="lap-label">周回</div>
  <div class="lap-num" id="lapNum">3/5</div>
</div>

<!-- SCENE -->
<div class="scene">
  <!-- Mountains -->
  <div class="mountain">
    <svg viewBox="0 0 1440 160" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="0,160 200,40 380,120 520,20 720,110 900,30 1100,100 1280,10 1440,90 1440,160" fill="#0d0010" opacity="0.9"/>
      <polygon points="0,160 150,70 300,130 480,50 660,120 800,60 950,130 1150,40 1300,100 1440,70 1440,160" fill="#12001a" opacity="0.6"/>
      <!-- Moon -->
      <circle cx="1300" cy="38" r="28" fill="#F5ECD7" opacity="0.12"/>
      <circle cx="1308" cy="32" r="24" fill="#0d0010" opacity="0.9"/>
    </svg>
  </div>

  <!-- Speed lines -->
  <div class="speed-lines" id="speedLines"></div>

  <!-- Sakura petals -->
  <div class="petals-container" id="petals"></div>

  <!-- Road -->
  <div class="road">
    <div class="road-line"></div>
    <div class="road-line"></div>
    <div class="road-line"></div>
    <div class="road-line"></div>
    <div class="road-line"></div>
  </div>

  <!-- Headlight beam -->
  <div class="headlight-beam" id="beam"></div>

  <!-- Exhaust smoke -->
  <div class="exhaust">
    <div class="smoke"></div>
    <div class="smoke"></div>
    <div class="smoke"></div>
  </div>

  <!-- CAR SVG -->
  <div class="car-wrapper" id="car">
    <svg class="car-svg" viewBox="0 0 280 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Body shadow -->
      <ellipse cx="140" cy="95" rx="110" ry="6" fill="rgba(0,0,0,0.5)"/>
      <!-- Main body -->
      <path d="M20,65 L40,35 Q55,18 90,16 L190,16 Q220,18 240,35 L258,65 L258,78 Q258,85 248,85 L32,85 Q22,85 20,78 Z" fill="#C0392B"/>
      <!-- Top cockpit -->
      <path d="M75,35 Q90,10 140,8 Q190,10 205,35 Z" fill="#8B0000"/>
      <!-- Windshield -->
      <path d="M88,32 Q105,14 140,12 Q175,14 192,32 Z" fill="rgba(180,220,255,0.3)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
      <!-- Side window -->
      <path d="M88,33 L80,52 L100,52 L105,33 Z" fill="rgba(180,220,255,0.2)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
      <path d="M192,33 L200,52 L180,52 L175,33 Z" fill="rgba(180,220,255,0.2)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
      <!-- Gold stripes -->
      <path d="M30,58 L250,58" stroke="#F4C842" stroke-width="3" opacity="0.9"/>
      <path d="M35,63 L245,63" stroke="#F4C842" stroke-width="1.5" opacity="0.5"/>
      <!-- Front wing -->
      <path d="M240,72 L278,70 L278,80 L240,80 Z" fill="#8B0000"/>
      <path d="M240,70 L278,68 L278,72 L240,72 Z" fill="#F4C842"/>
      <!-- Rear wing -->
      <path d="M18,62 L2,60 L2,52 L18,54 Z" fill="#8B0000"/>
      <path d="M18,60 L2,58 L2,62 L18,62 Z" fill="#F4C842"/>
      <!-- Engine intake -->
      <path d="M120,14 L160,14 L162,18 L118,18 Z" fill="#222" stroke="#F4C842" stroke-width="0.5"/>
      <!-- Number -->
      <text x="126" y="55" font-family="'Zen Dots',cursive" font-size="18" fill="#F4C842" font-weight="bold">01</text>
      <!-- Highlights -->
      <path d="M50,35 Q90,20 190,20 L220,35" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
      <!-- Wheels -->
      <circle cx="68" cy="85" r="17" fill="#111" stroke="#333" stroke-width="2"/>
      <circle cx="68" cy="85" r="10" fill="#222"/>
      <circle cx="68" cy="85" r="5" fill="#F4C842"/>
      <circle cx="200" cy="85" r="17" fill="#111" stroke="#333" stroke-width="2"/>
      <circle cx="200" cy="85" r="10" fill="#222"/>
      <circle cx="200" cy="85" r="5" fill="#F4C842"/>
      <!-- Headlights -->
      <ellipse cx="255" cy="68" rx="5" ry="3" fill="#FFF9C4" opacity="0.95"/>
      <ellipse cx="255" cy="68" rx="8" ry="5" fill="rgba(255,249,196,0.3)"/>
      <!-- Tail lights -->
      <ellipse cx="23" cy="70" rx="4" ry="3" fill="#FF1744" opacity="0.9"/>
      <ellipse cx="23" cy="70" rx="7" ry="5" fill="rgba(255,23,68,0.3)"/>
      <!-- Exhaust pipes -->
      <rect x="10" y="73" width="14" height="4" rx="2" fill="#555"/>
      <rect x="10" y="78" width="14" height="4" rx="2" fill="#555"/>
    </svg>
  </div>

  <!-- Sparks -->
  <div id="sparks"></div>
</div>

<!-- SPEED HUD -->
<div class="hud">
  <div class="speed-num" id="speedNum">284</div>
  <div class="speed-unit">km/h · 時速</div>
</div>

<script>
  // Generate speed lines
  const sl = document.getElementById('speedLines');
  for(let i = 0; i < 18; i++) {
    const line = document.createElement('div');
    line.className = 'speed-line';
    const top = 20 + Math.random() * 200;
    const w = 60 + Math.random() * 200;
    const dur = 0.3 + Math.random() * 0.4;
    const delay = -Math.random() * dur;
    line.style.cssText = `top:${top}px; width:${w}px; animation-duration:${dur}s; animation-delay:${delay}s;`;
    sl.appendChild(line);
  }

  // Generate petals
  const pc = document.getElementById('petals');
  for(let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const left = Math.random() * 100;
    const dur = 3 + Math.random() * 4;
    const delay = -Math.random() * dur;
    const size = 6 + Math.random() * 8;
    p.style.cssText = `left:${left}%; animation-duration:${dur}s; animation-delay:${delay}s; width:${size}px; height:${size*0.8}px;`;
    pc.appendChild(p);
  }

  // Generate sparks
  const sc = document.getElementById('sparks');
  for(let i = 0; i < 8; i++) {
    const sp = document.createElement('div');
    sp.className = 'spark';
    const bottom = 90 + Math.random() * 20;
    const left = 15 + Math.random() * 5;
    const dur = 0.4 + Math.random() * 0.3;
    const delay = -Math.random() * dur;
    sp.style.cssText = `bottom:${bottom}px; left:${left}%; animation-duration:${dur}s; animation-delay:${delay}s;`;
    sc.appendChild(sp);
  }

  // Animate speed number
  let baseSpeed = 284;
  setInterval(() => {
    const variation = Math.floor(Math.random() * 12) - 5;
    document.getElementById('speedNum').textContent = baseSpeed + variation;
  }, 120);
</script>
</body>
</html>
