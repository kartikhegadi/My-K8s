# clusterip.yaml
apiVersion: v1
kind: Pod
metadata:
  name: clusterip-pod
  labels:
    app: clusterip-pod
spec:
  containers:
  - name: clusterip-container
    image: nginx:latest
    ports:
    - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: clusterip-service
spec:
  type: ClusterIP
  selector:
    app: clusterip-pod
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80