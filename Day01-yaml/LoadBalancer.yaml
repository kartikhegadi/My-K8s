# loadbalancer.yaml
apiVersion: v1
kind: Pod
metadata:
  name: loadbalancer-pod
  labels:
    app: loadbalancer-pod
spec:
  containers:
  - name: loadbalancer-container
    image: nginx:latest
    ports:
    - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: loadbalancer-service
spec:
  type: LoadBalancer
  selector:
    app: loadbalancer-pod
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30080