# nodeport.yaml
apiVersion: v1
kind: Pod
metadata:
  name: nodeport-pod
  labels:
    app: nodeport-pod
spec:
  containers:
  - name: nodeport-container
    image: nginx:latest
    ports:
    - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: nodeport-service
spec:
  type: NodePort
  selector:
    app: nodeport-pod
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30080